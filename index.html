<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" title="light" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <link rel="stylesheet" title="dark" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <link rel="stylesheet" href="https://unpkg.com/docsify-plugin-toc@1.3.1/dist/light.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-accordion/src/style.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-dark-switch/dist/docsify-dark-switch.css">
  
  <style>
      /* 顶部导航栏 */
      .app-nav {
          font-size: 20px !important;
          padding: 6px 20px !important; 
          margin-top: -13px !important;   
          border-bottom: none !important;
      }
      .app-nav a {
          color: #5674a8 !important;
          margin: 0 10px !important;
          font-weight: 500 !important;
      }
      .app-nav a:hover {
          color: #64ffda !important;
      }

  </style>

</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '',
      repo: '',

      loadNavbar: true,
      loadSidebar: true,
      subMaxLevel: 4,

    pagination: {
      previousText: '上一章节', 
      nextText: {            
        '/': '下一章节'
      },
      crossChapter: true,     
      crossChapterText: true, 
  },

    count:{
      countable: true,  
      position: 'top',  
      margin: '20px',   
      float: 'left',   
      fontsize:'1.1em', 
      color: '#5674a8',
      language:'chinese',      
      localization: { 
        words: "",
        minute: ""
      },
      isExpected: true    
    },
    
    darkSwitch: {
        fixed: false, // 是否固定在顶部
        debug: false, // 是否开启调试模式
        style: {
            top: '25px',
            right: '60px'
        }
    },

    copyCode: {
      buttonText: {
          '/zh-cn/': '点击复制',
          '/ru/': 'Скопировать в буфер обмена',
          '/de-de/': 'Klicken Sie zum Kopieren',
          '/es/': 'Haga clic para copiar',
          '/': 'Copy to clipboard',
      },
      errorText: {
          '/zh-cn/': '错误',
          '/ru/': 'ошибка',
          '/': 'Error',
      },
      successText: {
          '/zh-cn/': '复制',
          '/ru/': 'Скопировано',
          '/de-de/': 'Kopiert',
          '/es/': 'Copiado',
          '/': 'Copied',
      },
  },

    tabs: {
      persist: true,  
      sync: true,     
      abComments: false,  
      tabHeaders: false  
    },

    timeUpdater: {
      text: "<div align='right' width='100%' style='font-size: 16px '>最后更新时间: {docsify-updated} </div>",
      formatUpdated: "{YYYY}/{MM}/{DD}",
      whereToPlace: "bottom",
    },

    toc: {
      tocMaxLevel: 5,
      target: 'h2, h3, h4, h5, h6',
      ignoreHeaders:  ['<!-- {docsify-ignore} -->', '<!-- {docsify-ignore-all} -->']
    },


}
  </script>


  <!-- Docsify v4 -->
  
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
  <script src="https://cdn.jsdelivr.net/gh/Sumsung524/docsify-backTop/dist/docsify-backTop.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2.1.1/dist/docsify-copy-code.min.js"></script>
  <script src="https://unpkg.com/docsify-plugin-flexible-alerts"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-count@latest/dist/countable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-updated/src/time-updater.min.js"></script>
  <script src="https://unpkg.com/docsify-plugin-toc@1.3.1/dist/docsify-plugin-toc.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-accordion/src/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-dark-switch/dist/docsify-dark-switch.min.js"></script>
  <script src="//unpkg.com/docsify-pagination/dist/docsify-pagination.min.js"></script>
