<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="renderer" content="webkit">
  <link rel="icon" href="./img/liuhua.ico">
  <link rel="stylesheet" title="light" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <link rel="stylesheet" title="dark" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <link rel="stylesheet" href="https://unpkg.com/docsify-plugin-toc@1.3.1/dist/light.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-accordion/src/style.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-dark-switch/dist/docsify-dark-switch.css">

    <style>
      /* 顶部导航栏 */
      .app-nav {
          font-size: 20px !important;
          padding: 6px 20px !important; 
          margin-top: -13px !important;   
          border-bottom: none !important;
      }
      .app-nav a {
          color: #5674a8 !important;
          margin: 0 10px !important;
          font-weight: 500 !important;
      }
      .app-nav a:hover {
          color: #64ffda !important;
      }
      
  </style>


</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
    base: '/Docsify-Blogs/',
    name: 'Docsify在线笔记',
    repo: '',
    coverpage: false,   // 是否显示封面
    loadNavbar: true,  // 是否加载导航
    loadSidebar: true, // 是否加载侧边栏
    autoHeader: true,  // 是否自动回到顶部
    onlyCover: false,  // 是否只显示封面
    routerMode: 'hash',// hash或者history
    maxLevel: 4,       // 侧边栏最大层级
    subMaxLevel: 4,    // 侧边栏子层级
    sidebarDisplayLevel: 5, // 侧边栏显示层级

    // 分页设置
    pagination: {
      previousText: '上一章节', 
      nextText: {            
        '/': '下一章节'
      },
      crossChapter: true,     
      crossChapterText: true, 
    },

    // 字数统计
    count:{
      countable: true,  
      position: 'top',  
      margin: '20px',   
      float: 'left',   
      fontsize:'1.1em', 
      color: '#5674a8',
      language:'chinese',      
      localization: { 
        words: "",
        minute: ""
      },
      isExpected: true    
    },
    
    // 明暗切换
    darkSwitch: {
        fixed: false, 
        debug: false, 
        style: {
            top: '25px',
            right: '60px'
        }
    },

    // 代码复制
    copyCode: {
      buttonText: {
          '/zh-cn/': '点击复制',
          '/ru/': 'Скопировать в буфер обмена',
          '/de-de/': 'Klicken Sie zum Kopieren',
          '/es/': 'Haga clic para copiar',
          '/': 'Copy to clipboard',
      },
    errorText: {
          '/zh-cn/': '错误',
          '/ru/': 'ошибка',
          '/': 'Error',
      },
    successText: {
          '/zh-cn/': '复制',
          '/ru/': 'Скопировано',
          '/de-de/': 'Kopiert',
          '/es/': 'Copiado',
          '/': 'Copied',
      },
    },

    // 搜索
    search: 'auto',
 
    // 页脚信息
    footer: {
      copy: '<span>ZG &copy; 2026</span>',
      auth: 'XXX备xxxxxx号',
      pre: '',
      style: 'text-align: center;',
      class: 'className'
    },

    // 标签
    tabs: {
      persist: true,  
      sync: true,
      theme: 'classic',
      tabComments: true,  
      tabHeaders: true  
    },

    
    // 更新时间
    timeUpdater: {
      text: "<div align='right' width='100%' style='font-size: 16px '>最后更新时间: {docsify-updated} </div>",
      formatUpdated: "{YYYY}/{MM}/{DD}",
      whereToPlace: "bottom",
    },
    
    // 侧边栏
    toc: {
      tocMaxLevel: 5,
      target: 'h2, h3, h4, h5, h6',
      ignoreHeaders:  ['<!-- {docsify-ignore} -->', '<!-- {docsify-ignore-all} -->']
    },

    // Markdown 渲染
    markdown: {
        renderer: {
          code: function (code, lang) {
            if (lang === 'drawio') {
              if (window.drawioConverter) {
                console.log('drawio 转化中')
                return window.drawioConverter(code)
              } else {
                return `<div class='drawio-code'>${code}</div>`
              }
            } else if(lang === 'pdf'){
              var pdf_renderer = function(code, lang, verify) {
                  function unique_id_generator(){
                      function rand_gen(){
                          return Math.floor((Math.random()+1) * 65536).toString(16).substring(1);
                      }
                      return rand_gen() + rand_gen() + '-' + rand_gen() + '-' + rand_gen() + '-' + rand_gen() + '-' + rand_gen() + rand_gen() + rand_gen();
                  }
                  if(lang && !lang.localeCompare('pdf', 'en', {sensitivity: 'base'})){
                      if(verify){
                          return true;
                      }else{
                          var divId = "markdown_code_pdf_container_" + unique_id_generator().toString();
                          var container_list = new Array();
                          if(localStorage.getItem('pdf_container_list')){
                              container_list = JSON.parse(localStorage.getItem('pdf_container_list'));	
                          }
                          container_list.push({"pdf_location": code, "div_id": divId});
                          localStorage.setItem('pdf_container_list', JSON.stringify(container_list));
                          return (
                              '<div style="margin-top:'+ PDF_MARGIN_TOP +'; margin-bottom:'+ PDF_MARGIN_BOTTOM +';" id="'+ divId +'">'
                                  + '<a href="'+ code + '"> Link </a> to ' + code +
                              '</div>'
                          );
                      } 
                  }
                  return false;
              }
              if(pdf_renderer(code, lang, true)){
                return pdf_renderer(code, lang, false);
              }
            } 
            else {
              return this.origin.code.apply(this, arguments);
            }
          }
        }
      }

}
  </script>
  <!-- Vue -->
  <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.min.js"></script>
  <!-- Docsify -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.0/lib/docsify.js"></script>
  <!-- docsify Tabs -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
  <!-- docsify 回到顶部 -->
  <script src="https://cdn.jsdelivr.net/gh/Sumsung524/docsify-backTop/dist/docsify-backTop.min.js"></script>
  <!-- docsify 图片放大 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <!-- docsify 复制代码 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2.1.1/dist/docsify-copy-code.min.js"></script>
  <!-- docsify 文本提示 -->
  <script src="https://unpkg.com/docsify-plugin-flexible-alerts"></script>
  <!-- docsify 字数统计 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-count@latest/dist/countable.min.js"></script>
  <!-- docsify 更新时间 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-updated/src/time-updater.min.js"></script>
  <!-- docsify 侧边目录 -->
  <script src="https://unpkg.com/docsify-plugin-toc@1.3.1/dist/docsify-plugin-toc.min.js"></script>
  <!-- 侧边栏扩展与折叠 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <!-- docsify 问答 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-accordion/src/index.js"></script>
  <!-- docsify 搜索 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <!-- docsify 明暗切换 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-dark-switch/dist/docsify-dark-switch.min.js"></script>
  <!-- docsify 分页 -->
  <script src="//unpkg.com/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <!-- 页脚信息 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-footer-enh/dist/docsify-footer-enh.min.js"></script>
  <!-- docsify pdf embed -->
  <script src="https://cdn.jsdelivr.net/npm/pdfobject@2.2.8/pdfobject.min.js"></script> 
  <script src="https://cdn.jsdelivr.net/npm/docsify-pdf-embed-plugin/src/docsify-pdf-embed.js"></script>
